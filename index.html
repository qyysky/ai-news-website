<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="每日聚合 AI 新闻与行业动态" />
    <title>AI Daily · 每日 AI 新闻</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="AI Daily 首页"><span class="brand-mark">AI</span><span>DAILY</span></a>
      <div class="topbar-right"><span class="live-dot"></span><span>自动更新中</span></div>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow">SIGNAL, NOT NOISE</p>
        <h1>每日 AI 新闻<br /><em>值得你花时间的部分。</em></h1>
        <p class="intro">从全球可信媒体和研究机构聚合人工智能动态。每天一次，快速掌握。</p>
      </section>

      <section class="dashboard" aria-label="新闻控制台">
        <div>
          <p class="section-label">TODAY'S EDITION</p>
          <h2 id="editionDate">正在加载今日简报…</h2>
        </div>
        <div class="stats"><span id="articleCount">— 篇资讯</span><span class="divider"></span><span id="updatedAt">更新中</span></div>
      </section>

      <section class="filters" aria-label="按来源筛选">
        <button class="filter active" data-source="all">全部 <span id="totalBadge">0</span></button>
        <div id="sourceFilters" class="source-filters"></div>
      </section>

      <section id="newsGrid" class="news-grid" aria-live="polite">
        <div class="loading">正在获取新闻…</div>
      </section>
    </main>

    <footer>
      <span>AI DAILY / CURATED AUTOMATICALLY</span>
      <span>新闻链接均指向原始出处</span>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
