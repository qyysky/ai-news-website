<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="每日聚合湖北襄阳公开招聘信息" />
    <title>襄阳招聘日报 · 每日公开招聘信息</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="襄阳招聘日报首页"><span class="brand-mark">XY</span><span>JOBS</span></a>
      <div class="topbar-right"><span class="live-dot"></span><span>自动更新中</span></div>
    </header>

    <main>
      <section class="hero">
        <p class="eyebrow">XIANGYANG · HUBEI</p>
        <h1>襄阳每日招聘<br /><em>公开信息，一次看完。</em></h1>
        <p class="intro">聚合襄阳本地公开可访问的招聘公告与企业岗位。每天更新一次，链接均可直达原始发布页。</p>
      </section>

      <section class="dashboard" aria-label="招聘信息控制台">
        <div>
          <p class="section-label">TODAY'S EDITION</p>
          <h2 id="editionDate">正在加载今日简报…</h2>
        </div>
        <div class="stats"><span id="articleCount">— 篇资讯</span><span class="divider"></span><span id="updatedAt">更新中</span></div>
      </section>

      <section class="filters" aria-label="按来源筛选">
        <button class="filter active" data-source="all">全部 <span id="totalBadge">0</span></button>
        <div id="sourceFilters" class="source-filters"></div>
      </section>

      <section id="newsGrid" class="news-grid" aria-live="polite">
        <div class="loading">正在获取招聘信息…</div>
      </section>
    </main>

    <footer>
      <span>XIANGYANG JOBS / UPDATED DAILY</span>
      <span>仅聚合公开信息，不采集个人简历</span>
    </footer>
    <script src="app.js"></script>
  </body>
</html>
