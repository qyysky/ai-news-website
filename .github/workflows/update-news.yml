name: Update daily Xiangyang jobs

on:
  schedule:
    - cron: '0 0 * * *' # 08:00 China Standard Time
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch public recruitment sources
        run: python3 scripts/fetch_news.py
      - name: Commit refreshed news
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: update daily Xiangyang jobs"
          git push
